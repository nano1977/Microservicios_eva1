spring.application.name=demo

# Configuración de Base de Datos MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3307/microservicios_logistica
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Crear BD automáticamente
spring.jpa.hibernate.ddl-auto=update

# Forzar el puerto 8080
server.port=8080

# Configuración de SpringDoc OpenAPI (Swagger UI)
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Desabilitar advertencia JPA open-in-view
spring.jpa.open-in-view=false